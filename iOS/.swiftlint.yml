strict: true

excluded:
  - Pods

disabled_rules:
# Handled by SwiftFormat
  - attribute_name_spacing
  - closing_brace
  - colon
  - comma
  - comment_spacing
  - control_statement
  - duplicate_imports
  - empty_enum_arguments
  - empty_parameters
  - empty_parentheses_with_trailing_closure
  - function_name_whitespace
  - implicit_optional_initialization
  - leading_whitespace
  - no_space_in_method_call
  - opening_brace
  - private_over_fileprivate
  - redundant_discardable_let
  - redundant_void_return
  - return_arrow_whitespace
  - statement_position
  - syntactic_sugar
  - trailing_comma
  - trailing_newline
  - trailing_semicolon
  - trailing_whitespace
  - unneeded_break_in_switch
  - unused_closure_parameter
  - vertical_whitespace
  - void_return
# TODO
  - force_try
  - identifier_name
  - function_body_length
  - multiple_closures_with_trailing_closure
  - shorthand_operator
  - line_length
  - type_body_length
  - large_tuple
  - file_length
  - force_cast
  - cyclomatic_complexity
  - function_parameter_count
  - inclusive_language
  - todo